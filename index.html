<script>
        const SKILLS = ["數據統計與程式開發", "工程學與空間營造", "理化實驗與物質檢測", "環境生態與農林實務", "商業企劃與專案管理", "專業法規與政策解讀", "文字撰稿與公關溝通", "視覺設計與影音展演", "醫療生技與公共衛生"];
        let selectedSkills = [];
        let userName = ""; 
        
        const skillsContainer = document.getElementById('skills-container');
        if(skillsContainer) {
            SKILLS.forEach(skill => {
                const div = document.createElement('div');
                div.className = "skill-tag border border-stone-100 p-4 rounded-2xl text-xs cursor-pointer transition-all bg-white/40 shadow-sm";
                div.innerText = skill;
                div.onclick = () => {
                    if (selectedSkills.includes(skill)) {
                        selectedSkills = selectedSkills.filter(s => s !== skill);
                        div.classList.remove('active');
                    } else if (selectedSkills.length < 3) {
                        selectedSkills.push(skill);
                        div.classList.add('active');
                    }
                };
                skillsContainer.appendChild(div);
            });
        }

        function showView(viewId) {
            // 防呆：確保元素存在才進行隱藏/顯示
            ['view-start', 'view-form', 'view-loading', 'view-result'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.add('hidden');
            });
            const targetView = document.getElementById(viewId);
            if (targetView) targetView.classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        const form = document.getElementById('quizForm');
        if(form) {
            form.onsubmit = async (e) => {
                e.preventDefault();
                if (selectedSkills.length === 0) return alert('請至少選擇一個專業硬實力喔！');
                showView('view-loading');

                const loadingTexts = [
                    "📡 正在傳送你的經歷至綠領資料庫...",
                    "🕵️‍♂️ 心理分析師正在萃取你的潛在特質...",
                    "👩‍🔬 職能鑑定師進行硬實力戰鬥評估...",
                    "📊 系統正在配對 30+ 綠領職缺...",
                    "✍️ 資深主編正在為你撰寫最終回饋...",
                    "✨ 深度解析即將完成，這值得一點等待..."
                ];
                let textIndex = 0;
                const subtextElement = document.getElementById('loading-subtext');
                if (subtextElement) subtextElement.innerText = loadingTexts[0];
                
                window.loadingInterval = setInterval(() => {
                    textIndex = (textIndex + 1) % loadingTexts.length;
                    if (subtextElement) {
                        subtextElement.classList.remove('animate__fadeIn'); 
                        void subtextElement.offsetWidth; 
                        subtextElement.classList.add('animate__fadeIn');
                        subtextElement.innerText = loadingTexts[textIndex];
                    }
                }, 3500);

                const formData = new FormData(form);
                userName = formData.get('name'); 
                const userEmail = formData.get('email'); 
                
                const payload = {
                    "姓名": userName,
                    "學號": formData.get('studentId'),
                    "Email": userEmail,
                    "就讀科系": formData.get('major'),
                    "專業硬實力": selectedSkills,
                    "Q1_思維武器": formData.get('q1_mindset'),
                    "Q2_高光時刻": formData.get('q2_highlight'),
                    "Q3_理想場域": formData.get('q3_environment'),
                    "Q4_核心價值": formData.get('q4_value')
                };

                try {
                    // ⚡ 主線任務 Webhook
                    await fetch('https://hikko.app.n8n.cloud/webhook/b3f280df-0daf-424d-a69d-3c54e2cb9370', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    // 🔄 查詢任務 Webhook (迴圈)
                    window.checkResultLoop = setInterval(async () => {
                        try {
                            const checkUrl = `https://hikko.app.n8n.cloud/webhook/check-result?email=${encodeURIComponent(userEmail)}`;
                            const checkRes = await fetch(checkUrl);
                            
                            if (!checkRes.ok) return; 

                            const resultData = await checkRes.json();

                            if (resultData && resultData.length > 0 && resultData[0]["AI回饋"]) {
                                clearInterval(window.checkResultLoop);
                                clearInterval(window.loadingInterval);

                                const sheetRow = resultData[0];
                                const finalData = {
                                    output: sheetRow["AI回饋"],
                                    student_profile: {
                                        college: sheetRow["判斷學院"] || "未知學院",
                                        major: sheetRow["判斷科系"] || "未知科系",
                                        hard_skills: sheetRow["硬實力"] ? sheetRow["硬實力"].split(', ') : [],
                                        soft_skills: sheetRow["軟實力"] ? sheetRow["軟實力"].split(', ') : [],
                                        interests: sheetRow["興趣動機"] ? sheetRow["興趣動機"].split(', ') : []
                                    },
                                    recommended_jobs: [
                                        { job_name: sheetRow["推薦職缺1"], matches: [] },
                                        { job_name: sheetRow["推薦職缺2"], matches: [] }
                                    ]
                                };

                                renderResult(finalData); 
                            }
                        } catch (loopErr) {
                            console.log("AI 仍在運算中...", loopErr);
                        }
                    }, 5000);

                } catch (err) {
                    console.error(err);
                    if (window.loadingInterval) clearInterval(window.loadingInterval); 
                    if (window.checkResultLoop) clearInterval(window.checkResultLoop);
                    alert('系統連線異常：' + err.message);
                    showView('view-form');
                }
            };
        }

        function renderResult(data) {
            if (window.loadingInterval) clearInterval(window.loadingInterval);
            if (window.checkResultLoop) clearInterval(window.checkResultLoop);

            showView('view-result');
            
            let rawData = Array.isArray(data) ? data[0] : data;
            
            if (rawData.error === true && rawData.error_type === "UNKNOWN_MAJOR") {
                const resultView = document.getElementById('view-result');
                if(resultView) {
                    resultView.innerHTML = `
                        <div class="bg-white rounded-[40px] p-8 shadow-xl border border-emerald-50 mb-8 text-center animate__animated animate__shakeX">
                            <div class="text-6xl mb-4 mt-4">🤔</div>
                            <h3 class="text-2xl font-black text-[#1B4332] mb-4">找不到這個系所耶...</h3>
                            <p class="text-stone-500 mb-8 leading-relaxed">AI 顧問好像認不出你輸入的科系名稱。<br>可以試著輸入<b>全名</b>或是<b>最常見的系名</b>嗎？</p>
                            <button onclick="showView('view-form')" class="w-full bg-[#52B788] hover:bg-[#2D6A4F] text-white py-4 rounded-full text-lg font-bold transition-all shadow-md active:scale-95">返回修改科系</button>
                        </div>
                    `;
                }
                return; 
            }

            let feedbackText = rawData.output || rawData.text || "分析完成！祝你職涯順利。";
            let profile = rawData.student_profile || null;
            let jobs = rawData.recommended_jobs || [];

            const feedbackEl = document.getElementById('ai-feedback');
            if(feedbackEl) feedbackEl.innerText = feedbackText;

            if (profile) {
                const profileName = document.getElementById('profile-name');
                const profileSchool = document.getElementById('profile-school');
                const profileHard = document.getElementById('profile-hard');
                const profileSoft = document.getElementById('profile-soft');
                const profileInterest = document.getElementById('profile-interest');
                const profileCard = document.getElementById('student-profile-card');

                if(profileName) profileName.innerText = userName;
                if(profileSchool) profileSchool.innerText = `${profile.college || '未知學院'} / ${profile.major || '未知科系'}`;
                
                if(profileHard) profileHard.innerHTML = (profile.hard_skills || []).map(s => 
                    `<span class="text-xs bg-[#E8F5EE] text-[#2D6A4F] px-2 py-1 rounded-md shadow-sm border border-[#D8F3DC]">${s.split('（')[0]}</span>`
                ).join('');
                
                if(profileSoft) profileSoft.innerHTML = (profile.soft_skills || []).map(s => 
                    `<span class="text-xs bg-white text-stone-500 px-2 py-1 rounded-md shadow-sm border border-stone-200">${s}</span>`
                ).join('');

                if(profileInterest) profileInterest.innerHTML = (profile.interests || []).map(s => 
                    `<span class="text-xs bg-[#FFF8E7] text-[#D4A373] px-2 py-1 rounded-md shadow-sm border border-[#FAEDCD]">${s}</span>`
                ).join('');
                
                if(profileCard) profileCard.classList.remove('hidden');
            }

            const jobList = document.getElementById('job-list');
            if(jobList) {
                jobList.innerHTML = '';
                if (jobs.length === 0) {
                    jobList.innerHTML = '<p class="text-center text-stone-400 py-10 text-sm">目前無精準匹配結果，建議豐富你的故事內容喔！</p>';
                    return;
                }

                jobs.forEach((job, idx) => {
                    const card = document.createElement('div');
                    card.className = `p-6 rounded-[32px] border-2 mb-4 animate__animated animate__fadeInUp ${idx === 0 ? 'border-[#52B788] bg-[#F7FCF9] shadow-md' : 'border-stone-50 bg-white'}`;
                    card.style.animationDelay = `${idx * 0.2}s`;
                    card.innerHTML = `
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[10px] font-black bg-[#D8F3DC] text-[#2D6A4F] px-4 py-1.5 rounded-full uppercase tracking-widest">MATCH RECOMENDATION</span>
                        </div>
                        <h5 class="text-xl font-bold text-[#1B4332]">${job.job_name}</h5>
                        <div class="flex flex-wrap gap-2 mt-3">
                            ${(job.matches || []).map(m => `<span class="text-[10px] text-[#40916C] bg-white border border-[#D8F3DC] px-2 py-1 rounded-lg"># ${m}</span>`).join('')}
                        </div>
                    `;
                    jobList.appendChild(card);
                });
            }
        }
    </script>
